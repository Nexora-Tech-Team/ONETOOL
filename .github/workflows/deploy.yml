name: Deploy ONETOOL

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 72.61.209.201
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            fuser -k 8080/tcp 2>/dev/null || true
            bash ~/deploy-onetool.sh
